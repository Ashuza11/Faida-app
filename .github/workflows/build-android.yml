name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'faida-twa/**'   # only runs when Android project files change
  workflow_dispatch:     # allows manual trigger from GitHub UI at any time

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        working-directory: faida-twa
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: faida-debug-${{ github.run_number }}
          path: faida-twa/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
